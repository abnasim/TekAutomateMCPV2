[build]
builder = "NIXPACKS"

[deploy]
# Use direct node command to bypass the npm 'prestart' lifecycle hook.
# prestart rebuilds the BM25 RAG index (28MB, ~44k docs) which OOMs on Railway.
# The RAG index is pre-built and committed to the repo — no rebuild needed.
startCommand = "node --import tsx/esm src/index.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"

# ── Set these in the Railway Variables tab ──────────────────────────────────
# MCP_PUBLIC_URL      = https://your-project.up.railway.app   (no trailing slash)
# LIVE_INSTRUMENT_ENABLED = false   (true only for personal local deployments)
